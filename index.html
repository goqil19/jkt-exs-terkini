<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKT Exs Terkini</title>
    <meta name="description" content="Kumpulan berita terkini dari berbagai sumber terpercaya. Dapatkan informasi terbaru hari ini.">
    
    <!-- Open Graph for SEO -->
    <meta property="og:title" content="JKT Exs Terkini">
    <meta property="og:description" content="Kumpulan berita terkini dari berbagai sumber terpercaya.">
    <meta property="og:type" content="website">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <a href="/" class="logo">JKT Exs <span>Terkini</span></a>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Cari berita...">
                <button id="searchBtn" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="news-section">
            <h1 class="section-title">Berita Terbaru</h1>
            <div id="loading" class="loading-state">Memuat berita...</div>
            <div id="newsGrid" class="news-grid" style="display: none;">
                <!-- Cards will be injected here -->
            </div>
            <div id="noResults" class="no-results" style="display: none;">
                <p>Tidak ada berita ditemukan.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 JKT Exs Terkini. Hak cipta dilindungi undang-undang.</p>
            <div class="footer-links">
                <a href="admin.html">Login Admin</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/supabase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
